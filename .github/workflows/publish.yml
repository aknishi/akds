name: Publish packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@aknishi'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build
        working-directory: packages/tokens

      - name: Publish tokens
        run: npm publish
        working-directory: packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build reactkit
        run: npm run build
        working-directory: packages/reactkit

      - name: Publish reactkit
        run: npm publish
        working-directory: packages/reactkit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
